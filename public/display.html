<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic Display Board</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f8fafc;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .board {
      width: 100%;
      max-width: 1320px;
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 48px 56px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
      display: flex;
      flex-direction: column;
      gap: 32px;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a202c;
      letter-spacing: -0.5px;
      text-align: center;
      padding-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
    }

    .ticker {
      font-size: 15px;
      text-align: center;
      color: #718096;
      font-weight: 400;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 13px;
      color: #718096;
      font-weight: 500;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend .badge {
      width: 14px;
      height: 14px;
      border-radius: 6px;
      border: 2px solid #e2e8f0;
      background: #f7fafc;
    }

    .legend .badge--allowed {
      background: linear-gradient(135deg, #1a202c, #2d3748);
      border-color: transparent;
    }



    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    .card {
      background: #f7fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 110px;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.4s ease;
    }

    .card--visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card--active {
      background: #ffffff;
      border-color: #1a202c;
      box-shadow: 0 10px 25px rgba(26, 32, 44, 0.15);
    }

    .card--empty {
      background: #fafbfc;
      border: 2px dashed #e2e8f0;
    }

    .card__token {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #1a202c;
      font-family: 'Courier New', monospace;
    }

    .card--active .card__token {
      background: linear-gradient(135deg, #1a202c, #2d3748);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card--empty .card__token {
      color: #cbd5e0;
    }

    .card__name {
      font-size: 12px;
      font-weight: 600;
      color: #2d3748;
      line-height: 1.3;
    }

    .card--empty .card__name {
      color: #a0aec0;
      font-weight: 400;
    }

    .card__meta {
      display: flex;
      justify-content: center;
      gap: 8px;
      font-size: 11px;
      color: #718096;
      font-weight: 500;
    }

    .card__details {
      font-size: 10px;
      color: #a0aec0;
      font-weight: 500;
    }

    .card__status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 4px 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 999px;
      background: #f7fafc;
      border: 2px solid #e2e8f0;
      color: #718096;
      align-self: center;
    }

    .card__status--allowed {
      background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
      color: #ffffff;
      border: none;
      box-shadow: 0 4px 12px rgba(26, 32, 44, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #a0aec0;
      font-size: 16px;
      font-weight: 500;
    }

    .footer {
      font-size: 14px;
      color: #718096;
      text-align: center;
      margin-top: 24px;
      font-weight: 500;
    }

    .card--active {
      animation: cardPulse 3s ease-in-out infinite;
    }

    @keyframes cardPulse {
      0%, 100% { box-shadow: 0 10px 25px rgba(26, 32, 44, 0.15); }
      50% { box-shadow: 0 10px 30px rgba(26, 32, 44, 0.25); }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px 12px 40px;
      }

      .board {
        padding: 32px 20px;
        border-radius: 20px;
      }

      h1 {
        font-size: 20px;
      }

      .card__token {
        font-size: 28px;
      }

      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .card {
        padding: 12px 8px;
        min-height: 90px;
      }
    }
  </style>
</head>
<body>
  <audio id="admitBell" src="/sounds/bell.mp3" preload="auto"></audio>
  <div class="board">
    <h1>Now Admitting</h1>
    <div class="ticker" id="ticker">Awaiting updates...</div>
    <div class="legend">
      <span><span class="badge badge--allowed"></span>Admitted</span>
      <span><span class="badge"></span>Available Slot</span>
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty-state" id="emptyState">Please wait for your token call.</div>
  </div>
  <p class="footer">Please proceed when your token is displayed.</p>

  <script>
    const API_BASE = window.location.origin;
    const grid = document.getElementById('grid');
    const emptyState = document.getElementById('emptyState');
    const ticker = document.getElementById('ticker');
    const socket = io();

    let admitted = [];
    let snapshotCounts = { total: 0, waiting: 0, allowed: 0 };

    function formatTicker(count) {
      if (!count) {
        return 'Awaiting updates...';
      }
      return `${count} patient${count === 1 ? '' : 's'} currently admitted`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderCards() {
      const hasPeople = admitted.length > 0;
      emptyState.style.display = hasPeople ? 'none' : 'block';
      ticker.textContent = formatTicker(admitted.length);

      const cards = admitted
        .map((person, index) => {
          const age = Number.isFinite(person.age) ? `${person.age} yrs` : 'N/A';
          const country = person.country ? escapeHtml(person.country) : 'Unknown';
          const name = person.name ? escapeHtml(person.name) : 'Unnamed';
          const statusText = (person.status || 'allowed').toUpperCase();
          const statusClass =
            statusText === 'ALLOWED' ? 'card__status card__status--allowed' : 'card__status';

          return `
            <div class="card card--visible card--active" data-token="${escapeHtml(person.token)}">
              <div class="card__token">${escapeHtml(person.token)}</div>
              <div class="card__name">${name}</div>
            </div>
          `;
        })
        .join('');

      const placeholdersCount = Math.max(0, 20 - admitted.length);
      const placeholders = Array.from({ length: placeholdersCount })
        .map(
          () => `
            <div class="card card--visible card--empty">
              <div class="card__token">---</div>
              <div class="card__name">Available Slot</div>
            </div>
          `
        )
        .join('');

      grid.innerHTML = cards + placeholders;


    }

    function setAdmitted(list) {
      admitted = (list || [])
        .slice(0, 20)
        .map((person) => ({
          ...person,
          name: person.name || 'Unnamed',
          token: person.token || '---',
          status: (person.status || 'allowed').toUpperCase(),
        }));
      renderCards();
    }

    function removeToken(token) {
      const normalized = token.trim().toUpperCase();
      const next = admitted.filter((person) => person.token !== normalized);
      if (next.length !== admitted.length) {
        admitted = next;
        renderCards();
      }
    }

    async function fetchCounts() {
      try {
        const res = await fetch(`${API_BASE}/api/patients`);
        if (!res.ok) throw new Error('Failed to load people counts');
        const people = await res.json();

        snapshotCounts.total = Array.isArray(people) ? people.length : 0;
        snapshotCounts.waiting = Array.isArray(people)
          ? people.filter((p) => p.status === 'waiting').length
          : 0;
      } catch (error) {
        console.error(error);
        ticker.textContent = 'Unable to fetch data. Retrying...';
      }
    }

    async function fetchSnapshot() {
      try {
        const allowedRes = await fetch(`${API_BASE}/api/allowed`);
        if (!allowedRes.ok) throw new Error('Failed to load allowed people');

        const allowedData = await allowedRes.json();
        snapshotCounts.allowed = Array.isArray(allowedData) ? allowedData.length : 0;

        await fetchCounts();
        setAdmitted(allowedData);
      } catch (error) {
        console.error(error);
        ticker.textContent = 'Unable to fetch data. Retrying...';
      }
    }

    async function handleAllowedUpdate(list) {
      snapshotCounts.allowed = Array.isArray(list) ? list.length : 0;
      await fetchCounts();
      setAdmitted(list);
    }

    socket.on('allowed-update', (list) => {
      handleAllowedUpdate(list);
    });

    socket.on('patient-finished', async (token) => {
      removeToken(token);
      await fetchCounts();
      snapshotCounts.allowed = admitted.length;
      renderCards();
    });

    socket.on('new-patient', async () => {
      await fetchCounts();
      renderCards();
    });

    fetchSnapshot();
  </script>
</body>
</html>
